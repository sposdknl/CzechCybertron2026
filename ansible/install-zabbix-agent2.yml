---
- name: Install Zabbix agent2
  ansible.builtin.include_role:
    name: community.zabbix.zabbix_agent
  vars:
    zabbix_agent_version: 7.0
    zabbix_agent2: true
    zabbix_agent_hostname: "ansible"
    zabbix_agent_listenip: "{{ ansible_host }}"
    zabbix_agent_server: "{{ hostvars['zabbix-cylab']['ansible_host'] }}"
    zabbix_agent_serveractive: "{{ hostvars['zabbix-cylab']['ansible_host'] }}"
    zabbix_agent_host_state: present
...