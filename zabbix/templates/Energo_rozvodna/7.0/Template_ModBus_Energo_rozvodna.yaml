          key: 'modbus.get[tcp://{$MODBUS_ENDPOINT},{$MODBUS_SLAVEID},{$MODBUS_FUNCTION},{$MODBUS_ADDRESS},{$MODBUS_COUNT},{$MODBUS_TYPE}]'
          delay: 5s
          history: 7d
          value_type: TEXT
          trends: '0'
          tags:
            - tag: target
              value: modbus
          triggers:
            - uuid: 698d284330d14c1ba7e425102d970781
              expression: 'nodata(/Template ModBus Energo rozvodna/modbus.get[tcp://{$MODBUS_ENDPOINT},{$MODBUS_SLAVEID},{$MODBUS_FUNCTION},{$MODBUS_ADDRESS},{$MODBUS_COUNT},{$MODBUS_TYPE}],5m)=1'
              name: 'PLC does not send data'
              priority: HIGH
              description: 'PLC device not provide data'
              manual_close: 'YES'
              tags:
                - tag: target
                  value: plc
        - uuid: b06dba2f3c034b589c82cc9bf58818df
          name: 'Grid IN'
          type: DEPENDENT
          key: zbx.value0
          delay: '0'
          valuemap:
            name: StatusOO
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$[0]'
          master_item:
            key: 'modbus.get[tcp://{$MODBUS_ENDPOINT},{$MODBUS_SLAVEID},{$MODBUS_FUNCTION},{$MODBUS_ADDRESS},{$MODBUS_COUNT},{$MODBUS_TYPE}]'
          tags:
            - tag: target
