zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 9568b5b21c31459c9d4881bf60060fc7
      name: Templates/CyLab
  templates:
    - uuid: b884d9af1a9843668dfcf25558172da3
      template: 'Template ModBus Energo rozvodna'
      name: 'Template ModBus Energo rozvodna'
      description: 'Template for Energo rozvodna - CyLab'
      vendor:
        name: Open-Tech
        version: 7.0-0
      groups:
        - name: Templates/CyLab
      items:
        - uuid: 71100455206b4b6a958b0539e81aaad8
